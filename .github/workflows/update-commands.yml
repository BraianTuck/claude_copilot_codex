name: Content Monitor

on:
  schedule:
    - cron: '*/30 * * * *'  # Every 30 min — check YouTube for new videos
  push:
    branches: [main]
    paths: ['script.js']    # Trigger when changelog/content is updated
  workflow_dispatch:

concurrency:
  group: content-monitor
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  check-youtube:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check YouTube for new videos
        run: node check-youtube.js

      - name: Commit state update BEFORE sending notification
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add last-seen.json
          git diff --cached --quiet || git commit -m "chore: update last-seen YouTube state [skip ci]"
          git pull --rebase
          git push

      - name: Send YouTube notification to Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -s /tmp/youtube_message.txt ]; then
            cat /tmp/youtube_message.txt | jq -Rs "{chat_id: env.TELEGRAM_CHAT_ID, text: .}" | \
              curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
                -H "Content-Type: application/json" -d @-
          fi

  notify-linkedin:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check for new changelog entries
        run: node build-message.js

      - name: Commit state update BEFORE sending notification
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add last-seen.json
          git diff --cached --quiet || git commit -m "chore: update last-seen changelog state [skip ci]"
          git pull --rebase
          git push

      - name: Send LinkedIn notification to Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -s /tmp/message_body.txt ]; then
            HORA_MVD=$(TZ='America/Montevideo' date +'%Y-%m-%d %H:%M')
            BODY=$(cat /tmp/message_body.txt)
            TEXT=$(printf "🤖 AI Command Atlas\nNueva publicación de Claude\n\n%s\n\n🔗 linkedin.com/showcase/claude\n🕐 %s (Montevideo)" "$BODY" "$HORA_MVD")
            echo "$TEXT" | jq -Rs "{chat_id: env.TELEGRAM_CHAT_ID, text: .}" | \
              curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
                -H "Content-Type: application/json" -d @-
          fi
