name: Daily LinkedIn reminder

on:
  schedule:
    - cron: '0 11 * * *'  # 8:00 AM Montevideo (UTC-3)
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Send daily Telegram message
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          HORA_MVD=$(TZ='America/Montevideo' date +'%Y-%m-%d %H:%M')
          TEXT=$(printf "🤖 AI Command Atlas\nRecordatorio diario — Novedades de Claude\n\n🔗 linkedin.com/showcase/claude\n🕐 %s (Montevideo)" "$HORA_MVD")
          echo "$TEXT" | jq -Rs "{chat_id: env.TELEGRAM_CHAT_ID, text: .}" | \
            curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              -H "Content-Type: application/json" \
              -d @-
