name: Auto-update commands

on:
  schedule:
    - cron: '0 11 * * *'
  workflow_dispatch:

permissions:
  contents: write
  models: read

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run update script
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: node update-commands.js

      - name: Commit changes if any
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet && echo "No changes" && exit 0
          git add script.js docs/HISTORY.md
          git commit -m "chore: auto-update commands [skip ci]"
          git push

      - name: Daily Telegram status
        if: always()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          HORA_MVD=$(TZ='America/Montevideo' date +'%Y-%m-%d %H:%M')
          if [ -f /tmp/new_commands.txt ]; then
            NOTICIAS=$(cat /tmp/new_commands.txt)
            TEXT=$(printf "🤖 AI Command Atlas\nNuevas noticias de Claude ✅\n\n%s\n\n🔗 linkedin.com/showcase/claude\n🕐 %s (Montevideo)" "$NOTICIAS" "$HORA_MVD")
          else
            TEXT=$(printf "🤖 AI Command Atlas\nRevisión diaria completada - Sin nuevas noticias\n\n🔗 linkedin.com/showcase/claude\n🕐 %s (Montevideo)" "$HORA_MVD")
          fi
          echo "$TEXT" | jq -Rs "{chat_id: env.TELEGRAM_CHAT_ID, text: .}" > /tmp/payload.json
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d @/tmp/payload.json
